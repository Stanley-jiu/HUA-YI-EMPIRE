<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>How Java Script look like.</h1>
    <p id="demo">This is a paragraph.</p>
    <button type ="button" onclick="myFunction()">Click to changed paragragh.</button>

        function myFunction() {
            document.getElementById("demo").innerHTML = "This show that the paragraph have been changed.";
            
        }
    </script>
</body>
